r4_arm:
  # Publish all joint states
  joint_state_controller:
    type: joint_state_controller/JointStateController
    publish_rate: 50  
    
  # Position Controllers (effort_controllers/JointPositionController position_controllers/JointPositionController)
  #joint1_position_controller:
  #  type: position_controllers/JointPositionController #effort_controllers/JointPositionController 
  #  joint: joint_1
  #  pid: {p: 1.0, i: 0.0, d: 0.0}
  #joint2_position_controller:
  #  type: position_controllers/JointPositionController #effort_controllers/JointPositionController 
  #  joint: joint_2
  #  pid: {p: 1.0, i: 0.0, d: 0.01}
  #joint3_position_controller:
  #  type: position_controllers/JointPositionController #effort_controllers/JointPositionController 
  #  joint: joint_3
  #  pid: {p: 1.0, i: 0.0, d: 0.0}
  #joint4_position_controller:
  #  type: position_controllers/JointPositionController #effort_controllers/JointPositionController
  #  joint: joint_4
  #  pid: {p: 1.0, i: 0.0, d: 0.01}

  joints_position_controller:
    type: position_controllers/JointGroupPositionController
    joints: 
      - joint_1
      - joint_2
      - joint_3
      - joint_4

  # to use when controllers are position_controllers/JointPositionController type
  gazebo_ros_control/pid_gains:
    joint_1: {p: 5, i: 1, d: 0 }
    joint_2: {p: 50, i: 1, d: 0 }
    joint_3: {p: 5, i: 1, d: 0 }
    joint_4: {p: 10, i: 1, d: 0 }


  # trajectory controller
  joint_trajectory_controller:
    type: "effort_controllers/JointTrajectoryController"
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4

    constraints:
      goal_time: 0.5                   # Override default
      stopped_velocity_tolerance: 0.02 # Override default
      joint_1:
        trajectory: 0.05               # Not enforced if unspecified
        goal: 0.01                     # Not enforced if unspecified
      joint_2:
        trajectory: 0.05               # Not enforced if unspecified
        goal: 0.01                     # Not enforced if unspecified
      joint_3:
        trajectory: 0.05               # Not enforced if unspecified
        goal: 0.01                     # Not enforced if unspecified
      joint_4:
        trajectory: 0.05               # Not enforced if unspecified
        goal: 0.01                     # Not enforced if unspecified

    gains: # Required because we're controlling an effort interface
      joint_1: {p: 5.0,  i: 1, d: 0, i_clamp: 1}
      joint_2: {p: 50.0, i: 1, d: 0, i_clamp: 1}
      joint_3: {p: 5.0,  i: 1, d: 0, i_clamp: 1}
      joint_4: {p: 50.0, i: 1, d: 0, i_clamp: 1}

    state_publish_rate:  50            # Override default
    action_monitor_rate: 50            # Override default
    stop_trajectory_duration: 0        # Override default


###  OTHERS ...


  # velocity controller
  joint1_velocity_controller:
    type: "effort_controllers/JointVelocityController"
    joint: joint_1
    pid: {p: 1.0, i: 0.0, d: 0.0}


  # joint group position effort controller
  joint_group_position_controller:
    type: "effort_controllers/JointGroupPositionController"
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4

    joint_1:
      pid: {p: 5, i: 1, d: 0 }
    joint_2:
      pid: {p: 50, i: 1, d: 0 }
    joint_3:
      pid: {p: 5, i: 1, d: 0 }
    joint_4:
      pid: {p: 10, i: 1, d: 0 }



  # effort controller DOES NOT EXIST !!!
  joint_group_effort_controller:
    type: "effort_controllers/JointGroupEffortController"
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4

    # TODO needed???
    joint_1:
      pid: {p: 1.0, i: 1.0, d: 0.0}
    joint_2:
      pid: {p: 1.0, i: 1.0, d: 0.0}
    joint_3:
      pid: {p: 1.0, i: 1.0, d: 0.0}
    joint_4:
      pid: {p: 1.0, i: 1.0, d: 0.0}



# check controllers type
# rosservice call /r4_arm/controller_manager/list_controller_types




