version: "2.3"
services:

  gazebo:
    image: ros_noetic_gazebo11
    container_name: gazebo
    tty: true
    ipc: host
    network_mode: "host"
    privileged: true
    security_opt:
      - seccomp:unconfined
    environment:
      - PULSE_SERVER=unix:${XDG_RUNTIME_DIR}/pulse/native
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - $HOME/.Xauthority:/home/robot/.Xauthority
      - ${XDG_RUNTIME_DIR}/pulse/native:${XDG_RUNTIME_DIR}/pulse/native
      - $PWD:/home/robot/src/iros2024
    working_dir: /home/robot/src/iros2024
    entrypoint:
    - bash
    - -ci 
    - "cd /home/robot/src/iros2024/bin && ./init_sim.bash"

  learn:
    image: torch_gym_sb3:cpu
    container_name: learn
    tty: true
    ipc: host
    network_mode: "host"
    privileged: true
    security_opt:
      - seccomp:unconfined
    environment:
      - PULSE_SERVER=unix:${XDG_RUNTIME_DIR}/pulse/native
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - $HOME/.Xauthority:/home/robot/.Xauthority
      - ${XDG_RUNTIME_DIR}/pulse/native:${XDG_RUNTIME_DIR}/pulse/native
      - $PWD:/home/robot/src/iros2024
    working_dir: /home/robot/src/iros2024
    entrypoint:
    - bash
    - -ci 
    - "cd /home/robot/src/iros2024/bin && ./init_learn.bash"


